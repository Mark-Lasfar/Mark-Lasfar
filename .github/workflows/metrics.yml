name: Metrics - Dynamic GitHub Stats

on:
  # بيتحدث كل 6 ساعات
  schedule:
    - cron: "0 */6 * * *"
  
  # تشغيل يدوي
  workflow_dispatch:
  
  # عند الـ push
  push:
    branches:
      - main
      - master

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # الإعدادات الأساسية
          user: Mark-Lasfar
          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-metrics.svg
          config_timezone: Africa/Cairo
          use_prebuilt_image: yes
          output_action: commit
          committer_message: "📊 auto: update github metrics [skip ci]"
          clean_workflows: failure, startup_failure, cancelled
          delay: 1
          output_condition: data-changed
          
          # ========================================
          # 1. معلومات المقدمة (Introduction)
          # ========================================
          plugin_introduction: yes
          plugin_introduction_title: yes
          
          # ========================================
          # 2. التقويم الحراري (Calendar)
          # ========================================
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # ========================================
          # 3. متابعة المستخدمين (Followup)
          # ========================================
          plugin_followup: yes
          
          # ========================================
          # 4. اللغات المستخدمة (Languages)
          # ========================================
          plugin_languages: yes
          plugin_languages_threshold: 0%
          plugin_languages_ignored: html, css, dockerfile, cmake, makefile, php
          plugin_languages_aliases: Batchfile:Powershell
          plugin_languages_colors: github
          plugin_languages_limit: 6
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          
          # ========================================
          # 5. عدد سطور الكود (Lines of Code)
          # ========================================
          plugin_lines: yes
          
          # ========================================
          # 6. النجوم (Stars)
          # ========================================
          plugin_stars: yes
          plugin_stars_limit: 6
          
          # ========================================
          # 7. الـ repositories المميزة
          # ========================================
          plugin_repositories: yes
          plugin_repositories_affiliations: owner, collaborator, organization_member
          plugin_repositories_order: featured, pinned, starred, random
          plugin_repositories_featured: Mark-Lasfar/MGZon, Mark-Lasfar/hager-zon
          
          # ========================================
          # 8. الإنجازات (Achievements)
          # ========================================
          plugin_achievements: yes
          plugin_achievements_limit: 6
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          
          # ========================================
          # 9. النشاط الأخير (Activity)
          # ========================================
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 30
          plugin_activity_visibility: public
          plugin_activity_filter: issue, pr, release, fork, review, discussion, push
          
          # ========================================
          # 10. المواضيع (Topics) في الـ repos
          # ========================================
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: labels
          
          # ========================================
          # 11. إحصائيات إضافية
          # ========================================
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_repositories: yes
          
          # ========================================
          # 12. الـ stickers (إضافة جميلة)
          # ========================================
          plugin_stickers: yes
          plugin_stickers_limit: 6
          
          # ========================================
          # 13. الـ traffic (مشاهدات ونجوم)
          # ========================================
          plugin_traffic: yes